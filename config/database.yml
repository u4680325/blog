# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  adapter: sqlite3
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: storage/development.sqlite3

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: storage/test.sqlite3

production:
  primary: 
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    host: 127.0.0.1
    port: 5431
    database: school_blog_backend_production
    username: school_blog_backend
    password: '<%= Rails.application.credentials.db_password %>'
    socket: "/cloudsql/wis-samui:asia-southeast1:production-databases"
  cache:
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    host: 127.0.0.1
    port: 5431
    database: school_blog_backend_production_cache
    migrations_paths: db/cache_migrate
    username: school_blog_backend
    password: '<%= Rails.application.credentials.db_password %>'
    socket: "/cloudsql/wis-samui:asia-southeast1:production-databases"
  queue:
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    host: 127.0.0.1
    port: 5431
    database: school_blog_backend_production_queue
    migrations_paths: db/queue_migrate
    username: school_blog_backend
    password: '<%= Rails.application.credentials.db_password %>'
    socket: "/cloudsql/wis-samui:asia-southeast1:production-databases"
  cable:
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    host: 127.0.0.1
    port: 5431
    database: school_blog_backend_production_cable
    migrations_paths: db/cable_migrate
    username: school_blog_backend
    password: '<%= Rails.application.credentials.db_password %>'
    socket: "/cloudsql/wis-samui:asia-southeast1:production-databases"
